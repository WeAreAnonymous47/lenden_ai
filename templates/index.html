<!DOCTYPE html>
<html>
<head>
    <title>Lendenclub AI Advisor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #ece5dd;
        }

        .chat-container {
            max-width: 500px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .header {
            background: #0099E3;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 75%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background: #dcf8c6;
        }

        .bot {
            align-self: flex-start;
            background: #f1f0f0;
        }

        .input-box {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: #fff;
        }

        .input-box input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .input-box button {
            margin-left: 10px;
            padding: 10px 10px;
            border: none;
            border-radius: 50%;
            background: #0099E3;
            color: white;
            cursor: pointer;
        }

        .typing {
            font-size: 12px;
            color: gray;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 100%;
                height: 90vh;
            }
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        Lendenclub AI Advisor
    </div>

    <div id="messages" class="messages"></div>

    <div class="typing" id="typing" style="display:none;">AI is typing...</div>

    <div class="input-box">
        <input type="text" id="input" placeholder="Type your message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>

function appendMessage(text, className) {
    let msgDiv = document.createElement("div");
    msgDiv.className = "msg " + className;
    msgDiv.innerText = text;

    document.getElementById("messages").appendChild(msgDiv);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

function sendMessage() {
    let inputField = document.getElementById("input");
    let message = inputField.value.trim();

    if (!message) return;

    appendMessage(message, "user");
    inputField.value = "";

    document.getElementById("typing").style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("typing").style.display = "none";
        appendMessage(data.reply, "bot");
    })
    .catch(() => {
        document.getElementById("typing").style.display = "none";
        appendMessage("Error connecting to server", "bot");
    });
}

function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>
</html>
